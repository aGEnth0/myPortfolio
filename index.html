<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    html,body{margin:0;padding:0;background:#F4F2EC;}
    *{box-sizing:border-box;}
    ::selection{background:#1A1A1A;color:#F4F2EC;}
  </style>
  <script src="image-slot.js"></script>
</helmet>
<div style="min-height:100vh;background:{{ bg }};color:{{ ink }};font-family:'Hanken Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased;padding:30px clamp(20px,5vw,64px) 64px;">

  <header style="display:flex;align-items:center;justify-content:space-between;gap:24px;padding-bottom:clamp(36px,5vw,56px);">
    <button onClick="{{ goHome }}" aria-label="Home" style="background:none;border:none;padding:0;margin:0;cursor:pointer;color:inherit;font-family:inherit;font-size:clamp(17px,2.2vw,22px);font-weight:600;letter-spacing:.18em;text-transform:uppercase;line-height:1;">CHUNG&nbsp;HANJUN</button>
    <nav style="display:flex;align-items:center;gap:26px;">
      <button onClick="{{ goHome }}" style="background:none;border:none;cursor:pointer;font-family:inherit;font-size:15px;font-weight:500;letter-spacing:.01em;color:inherit;padding:0;">Home</button>
      <a href="{{ igUrl }}" target="_blank" rel="noopener noreferrer" aria-label="Instagram" style="display:flex;color:inherit;line-height:0;">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
          <rect x="3" y="3" width="18" height="18" rx="5.2"></rect>
          <circle cx="12" cy="12" r="4.1"></circle>
          <circle cx="17.2" cy="6.8" r="1.1" fill="currentColor" stroke="none"></circle>
        </svg>
      </a>
    </nav>
  </header>

  <sc-if value="{{ isHome }}" hint-placeholder-val="{{ true }}">
    <main style="columns:3 300px;column-gap:clamp(20px,2.4vw,38px);">
      <sc-for list="{{ series }}" as="s" hint-placeholder-count="0">
        <div onClick="{{ s.onCardClick }}" style="break-inside:avoid;margin:0 0 clamp(30px,3.4vw,48px);cursor:pointer;">
          <sc-if value="{{ editMode }}" hint-placeholder-val="{{ false }}">
            <div style="position:relative;width:100%;aspect-ratio:{{ s.coverAr }};background:#E7E4DC;">
              <image-slot id="{{ s.cover }}" shape="rect" placeholder="{{ s.dropLabel }}" style="position:absolute;inset:0;width:100%;height:100%"></image-slot>
            </div>
          </sc-if>
          <sc-if value="{{ viewMode }}" hint-placeholder-val="{{ true }}">{{ s.img }}</sc-if>
          <div style="display:flex;align-items:baseline;gap:9px;padding-top:13px;">
            <span style="font-size:15px;font-weight:500;letter-spacing:.005em;">{{ s.name }}</span>
            <span style="font-size:15px;font-weight:500;letter-spacing:.02em;color:inherit;">{{ s.year }}</span>
          </div>
        </div>
      </sc-for>
    </main>
  </sc-if>

  <sc-if value="{{ isSeries }}" hint-placeholder-val="{{ true }}">
    <main>
      <div style="display:flex;align-items:baseline;gap:14px;padding-bottom:clamp(26px,3.2vw,44px);">
        <h1 style="font-size:clamp(28px,4.4vw,48px);font-weight:600;margin:0;letter-spacing:-0.015em;line-height:1;">{{ currentName }}</h1>
        <span style="font-size:clamp(28px,4.4vw,48px);font-weight:600;color:inherit;letter-spacing:-0.01em;line-height:1;">{{ currentYear }}</span>
      </div>
      <div style="columns:3 300px;column-gap:clamp(20px,2.4vw,38px);">
        <sc-for list="{{ currentPhotos }}" as="p" hint-placeholder-count="0">
          <div onClick="{{ p.onClick }}" style="break-inside:avoid;margin:0 0 clamp(20px,2.4vw,38px);cursor:pointer;">
            <sc-if value="{{ editMode }}" hint-placeholder-val="{{ false }}">
              <div style="position:relative;width:100%;aspect-ratio:{{ p.ar }};background:#E7E4DC;">
                <image-slot id="{{ p.id }}" shape="rect" placeholder="{{ p.label }}" style="position:absolute;inset:0;width:100%;height:100%"></image-slot>
              </div>
            </sc-if>
            <sc-if value="{{ viewMode }}" hint-placeholder-val="{{ true }}">{{ p.img }}</sc-if>
          </div>
        </sc-for>
      </div>
    </main>
  </sc-if>

  <sc-if value="{{ isPhoto }}" hint-placeholder-val="{{ true }}">
    <main>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:18px;padding-bottom:clamp(22px,3vw,38px);flex-wrap:wrap;">
        <button onClick="{{ backToSeries }}" style="background:none;border:none;cursor:pointer;color:inherit;font-family:inherit;font-size:clamp(16px,2.4vw,22px);font-weight:600;letter-spacing:-0.01em;padding:0;display:flex;align-items:baseline;gap:10px;"><span style="font-size:14px;font-weight:400;color:#9B968B;">←</span><span style="white-space:nowrap;">{{ currentName }} {{ currentYear }}</span></button>
        <div style="display:flex;gap:8px;">
          <button onClick="{{ prevPhoto }}" style="background:none;border:1px solid rgba(140,135,125,0.4);border-radius:999px;cursor:pointer;color:inherit;font-family:inherit;font-size:13px;letter-spacing:.04em;padding:7px 16px;">Prev</button>
          <button onClick="{{ nextPhoto }}" style="background:none;border:1px solid rgba(140,135,125,0.4);border-radius:999px;cursor:pointer;color:inherit;font-family:inherit;font-size:13px;letter-spacing:.04em;padding:7px 16px;">Next</button>
        </div>
      </div>
      <div style="display:flex;gap:clamp(24px,4vw,60px);align-items:flex-start;flex-wrap:wrap;">
        <div style="flex:1 1 440px;min-width:0;display:flex;justify-content:center;">
          <sc-if value="{{ editMode }}" hint-placeholder-val="{{ false }}">
            <div style="position:relative;width:auto;height:min(74vh,780px);max-width:100%;aspect-ratio:{{ detailAr }};">
              <image-slot id="{{ detailId }}" fit="contain" shape="rect" placeholder="{{ detailLabel }}" style="position:absolute;inset:0;width:100%;height:100%"></image-slot>
            </div>
          </sc-if>
          <sc-if value="{{ viewMode }}" hint-placeholder-val="{{ true }}">{{ detailImg }}</sc-if>
        </div>
        <aside style="flex:0 0 clamp(220px,26vw,300px);width:100%;max-width:340px;">
          <div style="font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#9B968B;padding-bottom:6px;">Metadata</div>
          <div style="font-size:17px;font-weight:600;letter-spacing:-0.01em;padding-bottom:18px;">{{ detailLabel }}</div>
          <sc-if value="{{ detailHasMeta }}" hint-placeholder-val="{{ true }}">
            <div>
              <sc-for list="{{ detailMeta }}" as="row" hint-placeholder-count="5">
                <div style="display:flex;align-items:baseline;justify-content:space-between;gap:20px;padding:11px 0;border-top:1px solid rgba(140,135,125,0.28);">
                  <span style="font-size:13px;color:#9B968B;letter-spacing:.03em;min-width:0;">{{ row.k }}</span>
                  <span style="font-size:14px;font-weight:500;text-align:right;white-space:nowrap;flex-shrink:0;">{{ row.v }}</span>
                </div>
              </sc-for>
            </div>
          </sc-if>
          <sc-if value="{{ detailNoMeta }}" hint-placeholder-val="{{ true }}">
            <div style="font-size:13px;color:#9B968B;line-height:1.65;border-top:1px solid rgba(140,135,125,0.28);padding-top:14px;">No EXIF metadata found. Drop an original JPEG straight from the camera to read camera, lens, shutter and ISO.</div>
          </sc-if>
        </aside>
      </div>
    </main>
  </sc-if>

  <sc-if value="{{ editMode }}" hint-placeholder-val="{{ false }}">
    <div style="position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:60;display:flex;align-items:center;gap:12px;background:#1A1A1A;color:#F4F2EC;font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:9px 10px 9px 16px;border-radius:999px;box-shadow:0 8px 28px rgba(0,0,0,.28);">
      <span>Edit mode</span>
      <button onClick="{{ exitEdit }}" style="background:rgba(255,255,255,.16);border:none;color:inherit;font-family:inherit;font-size:10px;letter-spacing:.1em;text-transform:uppercase;border-radius:999px;padding:5px 11px;cursor:pointer;">Exit · ⇧E</button>
    </div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;bg&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#000000&quot;,&quot;options&quot;:[&quot;#F4F2EC&quot;,&quot;#F1EEE6&quot;,&quot;#EDEAE2&quot;,&quot;#F6F5F2&quot;]},&quot;ink&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#ff5722&quot;,&quot;options&quot;:[&quot;#1A1A1A&quot;,&quot;#26231E&quot;,&quot;#2A2D2C&quot;]}}">
class Component extends DCLogic {
  constructor(...args) {
    super(...args);
    const pool = ['3/4', '4/5', '1/1', '5/4', '4/5', '3/4', '5/6', '1/1'];
    const defs = [
      { id: 'australia26', name: 'Australia', year: "26'", coverAr: '4/5', n: 7 },
      { id: 'hawaii24', name: 'Hawaii', year: "24'", coverAr: '1/1', n: 6 },
      { id: 'japan24', name: 'Japan', year: "24'", coverAr: '3/4', n: 8 },
      { id: 'japan23', name: 'Japan', year: "23'", coverAr: '5/4', n: 6 },
    ];
    this.seriesDefs = defs.map((d) => ({
      id: d.id,
      name: d.name,
      year: d.year,
      coverAr: d.coverAr,
      cover: 'cover-' + d.id,
      dropLabel: d.name + ' ' + d.year + ' — cover',
      photos: Array.from({ length: d.n }, (_, i) => ({
        id: d.id + '-' + (i + 1),
        ar: pool[i % pool.length],
        label: d.name + ' ' + d.year + ' — ' + (i + 1),
      })),
    }));
    let v = 'home';
    try { v = localStorage.getItem('rs_view') || 'home'; } catch (e) {}
    if (v !== 'home' && !this.seriesDefs.some((s) => s.id === v)) v = 'home';
    let edit = false;
    try { edit = localStorage.getItem('rs_edit') === '1' || /edit/i.test(location.hash || ''); } catch (e) {}
    this.state = { view: v, photo: null, ratios: {}, meta: {}, images: {}, editMode: edit };
  }

  componentDidMount() {
    this._scheduleWire();
    this._loadMeta();
    this._loadImages();
    this._onKey = (e) => {
      if ((e.key === 'E' || e.key === 'e') && e.shiftKey && !e.metaKey && !e.ctrlKey && !e.altKey) {
        const tag = (e.target && e.target.tagName) || '';
        if (/INPUT|TEXTAREA|SELECT/.test(tag) || (e.target && e.target.isContentEditable)) return;
        e.preventDefault();
        this._toggleEdit();
      }
    };
    window.addEventListener('keydown', this._onKey);
    this._onHash = () => { if (this._canEdit() && /edit/i.test(location.hash || '') && !this.state.editMode) this._setEdit(true); };
    window.addEventListener('hashchange', this._onHash);
  }

  componentWillUnmount() {
    if (this._onKey) window.removeEventListener('keydown', this._onKey);
    if (this._onHash) window.removeEventListener('hashchange', this._onHash);
  }

  _canEdit() { return !!(window.omelette && window.omelette.writeFile); }

  _setEdit(on) {
    const v = !!on && this._canEdit();
    try { localStorage.setItem('rs_edit', v ? '1' : '0'); } catch (e) {}
    this.setState({ editMode: v }, () => { if (!v) this._loadImages(); });
  }

  _toggleEdit() { this._setEdit(!this.state.editMode); }

  _loadImages() {
    fetch('.image-slots.state.json')
      .then((r) => (r.ok ? r.json() : null))
      .then((j) => {
        if (!j || typeof j !== 'object') return;
        const m = {};
        for (const k in j) { const val = j[k]; const u = typeof val === 'string' ? val : (val && val.u); if (u && /^data:image\//i.test(u)) m[k] = u; }
        this.setState({ images: m });
      })
      .catch(() => {});
  }
  componentDidUpdate() { this._scheduleWire(); }

  // Slots upgrade + fill asynchronously, so re-scan a few times after each
  // render. The WeakSet keeps wiring idempotent.
  _scheduleWire() {
    [0, 60, 200, 600].forEach((t) => setTimeout(() => this._wireSlots(), t));
  }

  _wireSlots() {
    if (!this._wired) this._wired = new WeakSet();
    const slots = document.querySelectorAll('image-slot');
    slots.forEach((slot) => {
      if (this._wired.has(slot)) return;
      const sr = slot.shadowRoot;
      if (!sr) return;
      const img = sr.querySelector('img');
      if (!img) return;
      this._wired.add(slot);
      if (slot._ingest && !slot.__exifHooked) {
        slot.__exifHooked = true;
        const orig = slot._ingest.bind(slot);
        slot._ingest = (file) => { try { this._grabExif(slot.id, file); } catch (e) {} return orig(file); };
      }
      const update = () => this._readRatio(slot, img);
      img.addEventListener('load', update);
      try {
        const mo = new MutationObserver(update);
        mo.observe(slot, { attributes: true, attributeFilter: ['data-filled'] });
      } catch (e) {}
      update();
    });
  }

  // Read the dropped photo's intrinsic ratio and store it so the tile (and
  // thus the masonry) reflows to the original proportions — no crop, no gap.
  _readRatio(slot, img) {
    const id = slot.id;
    if (!id) return;
    const filled = slot.hasAttribute('data-filled');
    const cur = (this.state.ratios || {})[id];
    if (filled && img.naturalWidth && img.naturalHeight) {
      const r = img.naturalWidth + '/' + img.naturalHeight;
      if (cur !== r) this.setState((s) => ({ ratios: Object.assign({}, s.ratios, { [id]: r }) }));
    } else if (!filled) {
      if (cur) this.setState((s) => { const n = Object.assign({}, s.ratios); delete n[id]; return { ratios: n }; });
      if ((this.state.meta || {})[id]) this.setState((s) => { const m = Object.assign({}, s.meta); delete m[id]; return { meta: m }; }, () => this._saveMeta());
    }
  }

  _loadMeta() {
    fetch('rs-photo-meta.state.json')
      .then((r) => (r.ok ? r.json() : null))
      .then((j) => { if (j && typeof j === 'object') this.setState((s) => ({ meta: Object.assign({}, j, s.meta) })); })
      .catch(() => {});
  }

  _saveMeta() {
    const w = window.omelette && window.omelette.writeFile;
    if (!w) return;
    try { Promise.resolve(w('rs-photo-meta.state.json', JSON.stringify(this.state.meta || {}))).catch(() => {}); } catch (e) {}
  }

  _storeMeta(id, meta) {
    if (!id) return;
    this.setState((s) => ({ meta: Object.assign({}, s.meta, { [id]: meta }) }), () => this._saveMeta());
  }

  _grabExif(id, file) {
    if (!id || !file) return;
    if (file.type === 'image/jpeg' || file.type === 'image/tiff') {
      file.arrayBuffer().then((buf) => { this._storeMeta(id, this._buildMeta(buf) || { empty: true }); }).catch(() => this._storeMeta(id, { empty: true }));
    } else {
      this._storeMeta(id, { empty: true, fmt: file.type });
    }
  }

  _buildMeta(buf) {
    let t;
    try { t = this._parseExif(buf); } catch (e) { t = null; }
    if (!t) return { empty: true };
    const out = {};
    const make = (t[0x010F] || '').toString().trim();
    const model = (t[0x0110] || '').toString().trim();
    out.camera = model || make || '';
    const lens = (t[0xA434] || '').toString().trim();
    if (lens) out.lens = lens;
    const fl = t[0x920A];
    if (fl) out.focal = Math.round(fl) + ' mm';
    const fn = t[0x829D];
    if (fn) out.aperture = 'f/' + (Math.round(fn * 10) / 10);
    const exp = t[0x829A];
    if (exp) out.shutter = exp >= 1 ? (Math.round(exp * 10) / 10) + ' s' : '1/' + Math.round(1 / exp) + ' s';
    let iso = t[0x8827];
    if (Array.isArray(iso)) iso = iso[0];
    if (iso) out.iso = 'ISO ' + iso;
    const dt = (t[0x9003] || '').toString().trim();
    if (dt) { const m = dt.match(/^(\d{4}):(\d{2}):(\d{2})/); out.date = m ? (m[1] + '.' + m[2] + '.' + m[3]) : dt; }
    if (!out.camera && !out.lens && !out.focal && !out.aperture && !out.shutter && !out.iso) return { empty: true };
    return out;
  }

  _parseExif(buf) {
    const view = new DataView(buf);
    if (view.byteLength < 12 || view.getUint16(0) !== 0xFFD8) return null;
    let off = 2;
    const len = view.byteLength;
    while (off + 4 <= len) {
      const marker = view.getUint16(off);
      if ((marker & 0xFF00) !== 0xFF00) break;
      const segLen = view.getUint16(off + 2);
      if (marker === 0xFFE1 && off + 10 <= len && view.getUint32(off + 4) === 0x45786966) {
        return this._readTiff(view, off + 10);
      }
      if (marker === 0xFFDA) break;
      off += 2 + segLen;
    }
    return null;
  }

  _readTiff(view, base) {
    const little = view.getUint16(base) === 0x4949;
    const u16 = (o) => view.getUint16(o, little);
    const u32 = (o) => view.getUint32(o, little);
    const s32 = (o) => view.getInt32(o, little);
    const tags = {};
    const sizes = { 1: 1, 2: 1, 3: 2, 4: 4, 5: 8, 7: 1, 9: 4, 10: 8 };
    const readVal = (entry) => {
      const type = u16(entry + 2);
      const count = u32(entry + 4);
      const total = (sizes[type] || 1) * count;
      let o = entry + 8;
      if (total > 4) o = base + u32(entry + 8);
      if (type === 2) {
        let str = '';
        for (let i = 0; i < count; i++) { const c = view.getUint8(o + i); if (!c) break; str += String.fromCharCode(c); }
        return str;
      }
      switch (type) {
        case 3: return u16(o);
        case 4: return u32(o);
        case 9: return s32(o);
        case 5: { const d = u32(o + 4); return d ? u32(o) / d : 0; }
        case 10: { const d = s32(o + 4); return d ? s32(o) / d : 0; }
        default: return view.getUint8(o);
      }
    };
    const readIFD = (dir) => {
      if (dir + 2 > view.byteLength) return;
      const n = u16(dir);
      for (let i = 0; i < n; i++) {
        const entry = dir + 2 + i * 12;
        if (entry + 12 > view.byteLength) break;
        tags[u16(entry)] = readVal(entry);
      }
    };
    readIFD(base + u32(base + 4));
    if (tags[0x8769]) readIFD(base + tags[0x8769]);
    return tags;
  }

  openPhoto(id) { this.setState({ photo: id }); try { window.scrollTo(0, 0); } catch (e) {} }
  closePhoto() { this.setState({ photo: null }); try { window.scrollTo(0, 0); } catch (e) {} }
  stepPhoto(dir) {
    const cur = this.seriesDefs.find((s) => s.id === this.state.view);
    if (!cur) return;
    const ids = cur.photos.map((p) => p.id);
    let i = ids.indexOf(this.state.photo);
    if (i < 0) return;
    i = (i + dir + ids.length) % ids.length;
    this.setState({ photo: ids[i] });
  }

  go(v) {
    try { localStorage.setItem('rs_view', v); } catch (e) {}
    this.setState({ view: v, photo: null });
    try { window.scrollTo(0, 0); } catch (e) {}
  }

  renderVals() {
    const view = this.state.view;
    const photoId = this.state.photo;
    const current = this.seriesDefs.find((s) => s.id === view) || null;
    const ratios = this.state.ratios || {};
    const metaAll = this.state.meta || {};
    const images = this.state.images || {};
    const editMode = !!this.state.editMode && this._canEdit();
    const viewMode = !editMode;
    const mkImg = (url, alt, style) => (url ? React.createElement('img', { src: url, alt: alt || '', style: style }) : null);
    const inPhoto = !!photoId && !!current && current.photos.some((p) => p.id === photoId)
      && (editMode || !!images[photoId]);
    const isHome = view === 'home' && !inPhoto;
    const isSeries = !!current && !inPhoto;

    let series;
    if (editMode) {
      series = this.seriesDefs.map((s) => ({
        id: s.id, name: s.name, year: s.year, cover: s.cover, dropLabel: s.dropLabel,
        coverAr: ratios[s.cover] || s.coverAr, url: '',
        onCardClick: (e) => {
          const t = e && e.target;
          const slot = t && t.closest ? t.closest('image-slot') : null;
          if (slot && !slot.hasAttribute('data-filled')) return;
          this.go(s.id);
        },
      }));
    } else {
      series = this.seriesDefs.filter((s) => images[s.cover]).map((s) => ({
        id: s.id, name: s.name, year: s.year, cover: s.cover, dropLabel: s.dropLabel,
        coverAr: ratios[s.cover] || s.coverAr, url: images[s.cover],
        img: mkImg(images[s.cover], s.name, { display: 'block', width: '100%', height: 'auto', background: '#E7E4DC' }),
        onCardClick: () => this.go(s.id),
      }));
    }

    let currentPhotos = [];
    if (current && editMode) {
      currentPhotos = current.photos.map((p) => ({
        id: p.id, ar: ratios[p.id] || p.ar, label: p.label, url: '',
        onClick: (e) => {
          const t = e && e.target;
          const slot = t && t.closest ? t.closest('image-slot') : null;
          if (!slot || !slot.hasAttribute('data-filled')) return;
          const r = slot.getBoundingClientRect();
          if (e.clientY > r.bottom + 1) return;
          this.openPhoto(p.id);
        },
      }));
    } else if (current) {
      currentPhotos = current.photos.filter((p) => images[p.id]).map((p) => ({
        id: p.id, ar: ratios[p.id] || p.ar, label: p.label, url: images[p.id],
        img: mkImg(images[p.id], p.label, { display: 'block', width: '100%', height: 'auto', background: '#E7E4DC' }),
        onClick: () => this.openPhoto(p.id),
      }));
    }

    const detailPhoto = inPhoto ? current.photos.find((p) => p.id === photoId) : null;
    const dm = inPhoto ? metaAll[photoId] : null;
    const detailMeta = [];
    if (dm && !dm.empty) {
      if (dm.camera) detailMeta.push({ k: 'Camera', v: dm.camera });
      if (dm.lens) detailMeta.push({ k: 'Lens', v: dm.lens });
      if (dm.focal) detailMeta.push({ k: 'Focal length', v: dm.focal });
      if (dm.aperture) detailMeta.push({ k: 'Aperture', v: dm.aperture });
      if (dm.shutter) detailMeta.push({ k: 'Shutter', v: dm.shutter });
      if (dm.iso) detailMeta.push({ k: 'ISO', v: dm.iso });
      if (dm.date) detailMeta.push({ k: 'Date', v: dm.date });
    }
    const detailHasMeta = detailMeta.length > 0;
    const detailImg = mkImg(photoId ? (images[photoId] || '') : '', detailPhoto ? detailPhoto.label : '', { display: 'block', maxWidth: '100%', maxHeight: 'min(74vh,780px)', width: 'auto', height: 'auto' });

    return {
      bg: this.props.bg ?? '#F4F2EC',
      ink: this.props.ink ?? '#1A1A1A',
      igUrl: 'https://www.instagram.com/chnghnjn/',
      editMode,
      viewMode,
      isHome,
      isSeries,
      isPhoto: inPhoto,
      series,
      currentName: current ? current.name : '',
      currentYear: current ? current.year : '',
      currentPhotos,
      detailId: photoId || '',
      detailUrl: photoId ? (images[photoId] || '') : '',
      detailImg,
      detailAr: detailPhoto ? (ratios[photoId] || detailPhoto.ar) : '3/2',
      detailLabel: detailPhoto ? detailPhoto.label : '',
      detailMeta,
      detailHasMeta,
      detailNoMeta: !detailHasMeta,
      backToSeries: () => this.closePhoto(),
      prevPhoto: () => this.stepPhoto(-1),
      nextPhoto: () => this.stepPhoto(1),
      exitEdit: () => this._setEdit(false),
      goHome: () => this.go('home'),
    };
  }
}
</script>
